name: README screenshot

on:
  push:
    paths:
      - README.md
      - docs/readme-output-screenshot.png
      - scripts/update-readme-screenshot.sh
      - src/**
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-screenshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Regenerate README screenshot
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Regenerate README screenshot
        run: scripts/update-readme-screenshot.sh

      - name: Commit updated screenshot
        run: |
          if git diff --quiet -- docs/readme-output-screenshot.png; then
            echo "README screenshot is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/readme-output-screenshot.png
          git commit -m "docs: update README output screenshot"
          git push
